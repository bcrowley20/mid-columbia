<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mid-Columbia Fisheries Data Analysis</title>
  </head>
  <body>
    <div id="app">
      <header id="app-header">
        <h1>Mid-Columbia Fisheries Data Analysis</h1>
        <img id="app-logo" src="/logo.png" alt="Mid-Columbia Fisheries" />
      </header>
      <div id="error-banner" class="banner banner-error" hidden></div>
      <div id="layout">
        <aside id="tree-pane">
          <div id="tree-pane-header">
            <button type="button" id="add-project-button" class="btn-add">+ Project</button>
          </div>
          <nav id="tree" aria-label="Projects"></nav>
        </aside>
        <main id="map-pane">
          <div id="map"></div>
          <div id="map-empty-state" class="map-empty-state" hidden></div>
          <section id="chart-panel" hidden>
            <div id="chart-panel-header">
              <div id="chart-panel-title"></div>
              <div id="chart-panel-controls">
                <label><input type="checkbox" id="chart-toggle-water-temp" /> Water temperature</label>
                <label><input type="checkbox" id="chart-toggle-air-temp" /> Air temperature</label>
                <button type="button" id="chart-reset-zoom">Reset zoom</button>
                <button type="button" id="chart-panel-close" aria-label="Close chart">&times;</button>
              </div>
            </div>
            <div id="chart-panel-body"></div>
          </section>
        </main>
      </div>
    </div>

    <dialog id="entity-dialog">
      <form id="entity-form">
        <h2 id="entity-dialog-title"></h2>
        <div id="entity-dialog-fields"></div>
        <div class="dialog-actions">
          <button type="button" id="entity-dialog-cancel">Cancel</button>
          <button type="submit" id="entity-dialog-submit">Save</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
